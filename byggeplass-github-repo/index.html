<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<title>Jørgens byggeplass</title>
<meta name="theme-color" content="#F5B921" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Byggeplass" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; }
  body {
    font-family: Nunito, system-ui, sans-serif;
    background: linear-gradient(#BFE6F7, #E8F6FD);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: calc(env(safe-area-inset-top) + 14px) 12px calc(env(safe-area-inset-bottom) + 30px);
    -webkit-user-select: none; user-select: none;
  }
  .card {
    width: 100%; max-width: 460px; background: #FFF8EC;
    border-radius: 26px; overflow: hidden; border: 3px solid #F2E3C6;
    box-shadow: 0 14px 36px rgba(92,61,33,.22);
  }
  .header { position: relative; background: #F5B921; }
  .stripes { height: 10px; background: repeating-linear-gradient(45deg,#2B2622 0 14px,#F5B921 14px 28px); }
  .headerInner { display: flex; align-items: center; gap: 8px; padding: 8px 14px 14px; }
  .title { margin: 0; font-family: Fredoka, sans-serif; font-weight: 700; font-size: 23px; color: #3A2E22; line-height: 1.05; white-space: nowrap; }
  .subtitle { margin: 2px 0 0; font-size: 13px; font-weight: 700; color: #6E4A24; }
  .soundBtn { flex-shrink: 0; width: 42px; height: 42px; border-radius: 12px; border: 2px solid #C9871A; background: #FFF8EC; font-size: 20px; cursor: pointer; }
  .starGrid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; place-items: center; padding: 18px 14px 4px; }
  .count { text-align: center; font-family: Fredoka, sans-serif; font-weight: 700; font-size: 30px; color: #E8841A; margin: 2px 0 12px; }
  .scene { position: relative; height: 224px; margin: 0 14px 18px; border-radius: 18px; overflow: hidden; background: linear-gradient(#CFEBFA, #EAF7FE); border: 3px solid #F2E3C6; }
  .ground { position: absolute; left: 0; right: 0; bottom: 0; height: 34px; background: linear-gradient(#A9763F, #875C2E); }
  .tower { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column-reverse; align-items: center; }
  .course { width: 80px; height: 15px; background-color: #C3BBA9;
    background-image: repeating-linear-gradient(90deg, rgba(60,46,30,.22) 0 2px, transparent 2px 22px), linear-gradient(rgba(255,255,255,.30), rgba(60,46,30,.14));
    border-top: 1.5px solid rgba(60,46,30,.28); box-shadow: inset 0 0 0 1px rgba(60,46,30,.08); position: relative; }
  .gate { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 22px; height: 13px; background: #3A2E22; border-radius: 11px 11px 0 0; box-shadow: inset 0 2px 2px rgba(0,0,0,.4); }
  .slit { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 4px; height: 10px; background: #3A2E22; border-radius: 2px; }
  .cap { position: relative; width: 90px; height: 16px; display: flex; flex-direction: column; justify-content: flex-end; }
  .parapet { width: 90px; height: 8px; background-color: #BBB39F;
    background-image: repeating-linear-gradient(90deg, rgba(60,46,30,.22) 0 2px, transparent 2px 22px), linear-gradient(rgba(255,255,255,.30), rgba(60,46,30,.14));
    border-top: 1.5px solid rgba(60,46,30,.28); box-shadow: 0 2px 3px rgba(60,46,30,.25); }
  .merlonRow { position: absolute; bottom: 7px; left: 0; width: 90px; display: flex; justify-content: space-between; padding: 0 5px; }
  .merlon { width: 12px; height: 10px; background-color: #C3BBA9;
    background-image: repeating-linear-gradient(90deg, rgba(60,46,30,.22) 0 2px, transparent 2px 22px), linear-gradient(rgba(255,255,255,.30), rgba(60,46,30,.14));
    border-top: 1.5px solid rgba(60,46,30,.28); border-radius: 2px 2px 0 0; }
  .flag { position: relative; width: 2px; height: 20px; display: flex; justify-content: center; }
  .flagPole { position: absolute; bottom: 0; width: 3px; height: 20px; background: #6E4A24; border-radius: 2px; }
  .pennant { position: absolute; top: 1px; left: 3px; width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 16px solid #E2483B; transform-origin: left center; animation: wave 1.1s ease-in-out infinite; }
  .sceneExcavator { position: absolute; left: 8px; bottom: 24px; }
  .prizeWrap { position: absolute; top: 8px; right: 8px; text-align: center; }
  .prizeLabel { font-size: 12px; font-weight: 800; color: #5C3D21; margin-bottom: 2px; font-family: Fredoka, sans-serif; }
  .prizeBox { width: 60px; height: 48px; background: rgba(255,248,236,.85); border: 3px dashed #C9871A; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
  .prizeBox.won { box-shadow: 0 0 0 4px #FFD23F, 0 8px 18px rgba(232,132,26,.4); }
  .arm { transform-origin: 88px 56px; transition: transform .35s ease; }
  .arm.dig { transform: rotate(-15deg); }
  .bigBtn { display: block; width: calc(100% - 28px); margin: 0 14px 6px; padding: 18px 16px; font-family: Fredoka, sans-serif; font-size: 24px; font-weight: 700; color: #3A2E22; background: linear-gradient(#FFD23F, #F5B921); border: none; border-radius: 18px; box-shadow: 0 6px 0 #C9871A, 0 10px 18px rgba(201,135,26,.35); cursor: pointer; }
  .bigBtn:active { transform: translateY(3px); box-shadow: 0 3px 0 #C9871A; }
  .bigBtn:disabled { opacity: .5; cursor: default; transform: none; box-shadow: 0 6px 0 #C9871A; }
  .grownupToggle { display: block; margin: 10px auto 14px; padding: 6px 14px; background: transparent; border: none; color: #8A7659; font-weight: 700; font-size: 13px; cursor: pointer; }
  .grownupBox { margin: 0 14px 16px; padding: 14px; background: #F4ECDB; border-radius: 14px; font-size: 14px; color: #5C3D21; }
  .grownupRow { display: flex; justify-content: space-between; padding: 4px 0; font-weight: 700; }
  .logList { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
  .logItem { background: #fff; border-radius: 8px; padding: 3px 8px; font-size: 12px; font-weight: 700; }
  .btnRow { display: flex; gap: 8px; margin-top: 8px; }
  .smallBtn { flex: 1; padding: 10px; border-radius: 10px; border: 2px solid #C9871A; background: #fff; color: #6E4A24; font-weight: 800; cursor: pointer; }
  .smallBtn.reset { border-color: #C45B5B; color: #C45B5B; }
  .smallBtn:disabled { opacity: .4; }
  .savedNote { text-align: center; font-size: 12px; color: #8A7659; margin: 10px 0 0; }
  .star { animation: none; }
  .star.pop { animation: pop .5s both; }
  .overlay { position: fixed; inset: 0; background: rgba(43,38,34,.55); display: none; align-items: center; justify-content: center; padding: 16px; overflow: hidden; z-index: 50; }
  .overlay.show { display: flex; }
  .overlayCard { background: #FFF8EC; border-radius: 24px; padding: 26px 22px; text-align: center; max-width: 360px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,.3); border: 4px solid #FFD23F; z-index: 2; }
  .hurra { font-family: Fredoka, sans-serif; font-weight: 700; font-size: 30px; color: #E8841A; margin: 6px 0; }
  .wonText { font-size: 17px; font-weight: 700; color: #5C3D21; margin: 4px 0; }
  .wiggle { animation: wiggle 1s ease-in-out infinite; }
  .confetti { position: absolute; top: -6vh; font-size: 26px; animation: fall linear forwards; }
  @keyframes pop { 0%{transform:scale(0) rotate(-20deg)} 65%{transform:scale(1.3)} 100%{transform:scale(1)} }
  @keyframes wiggle { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)} }
  @keyframes fall { from{transform:translateY(-10vh) rotate(0)} to{transform:translateY(110vh) rotate(360deg)} }
  @keyframes dropIn { from{transform:translateY(-26px);opacity:0} to{transform:translateY(0);opacity:1} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  @keyframes wave { 0%,100%{transform:skewY(0) translateX(0)} 50%{transform:skewY(-7deg) translateX(1px)} }
  button:focus-visible { outline: 4px solid #1d6fb8; outline-offset: 3px; }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="stripes"></div>
    <div class="headerInner">
      <span id="headExc"></span>
      <div style="flex:1; min-width:0;">
        <h1 class="title">Jørgens byggeplass</h1>
        <p class="subtitle">Tørr hele dagen = 1 stjerne ⭐</p>
      </div>
      <button class="soundBtn" id="soundBtn" aria-label="Lyd">🔊</button>
    </div>
  </div>

  <div class="starGrid" id="starGrid"></div>
  <div class="count" id="count"></div>

  <div class="scene">
    <div class="ground"></div>
    <div class="prizeWrap">
      <div class="prizeLabel">Premie</div>
      <div class="prizeBox" id="prizeBox"></div>
    </div>
    <div class="tower" id="tower"></div>
    <div class="sceneExcavator" id="sceneExc"></div>
  </div>

  <button class="bigBtn" id="giveBtn">Gi en stjerne ⭐</button>
  <button class="grownupToggle" id="grownupToggle">For mamma og pappa ▼</button>
  <div class="grownupBox" id="grownupBox" style="display:none;">
    <div class="grownupRow"><span>Premier vunnet</span><strong id="prizesWon">0 🏰</strong></div>
    <div class="grownupRow"><span>Stjerner denne runden</span><strong id="roundCount">0 / 10</strong></div>
    <div class="logList" id="logList"></div>
    <div class="btnRow">
      <button class="smallBtn" id="undoBtn">Angre siste</button>
      <button class="smallBtn reset" id="resetBtn">Nullstill runde</button>
    </div>
    <p class="savedNote">Fremdriften lagres automatisk ✓</p>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="overlayCard">
    <div class="wiggle" id="overlayExc"></div>
    <h2 class="hurra">HURRA, JØRGEN!</h2>
    <p class="wonText">Du bygde hele riddertårnet med <strong>10 stjerner</strong> ⭐</p>
    <p class="wonText">Du har vunnet en gravemaskin! 🚜</p>
    <button class="bigBtn" id="newRoundBtn">Start ny runde</button>
  </div>
</div>

<script>
(function () {
  "use strict";
  var GOAL = 10;
  var KEY = "jorgen-byggeplass-v1";

  var state = { stars: 0, log: [], prizesWon: 0, muted: false };
  try {
    var saved = localStorage.getItem(KEY);
    if (saved) {
      var s = JSON.parse(saved);
      state.stars = s.stars || 0;
      state.log = s.log || [];
      state.prizesWon = s.prizesWon || 0;
      state.muted = !!s.muted;
    }
  } catch (e) {}

  function save() {
    try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) {}
  }

  // ---- Lyd ----
  var actx = null;
  function ctx() {
    if (!actx) {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (AC) actx = new AC();
    }
    return actx;
  }
  function tone(freq, start, dur, gain, type) {
    var c = ctx(); if (!c) return;
    if (c.state === "suspended") c.resume();
    var o = c.createOscillator(), g = c.createGain();
    o.type = type || "square"; o.frequency.value = freq;
    o.connect(g); g.connect(c.destination);
    var t = c.currentTime + start;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain || 0.12, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t); o.stop(t + dur + 0.05);
  }
  function starSound() { if (state.muted) return; tone(660,0,0.12); tone(880,0.13,0.16); }
  function winSound() { if (state.muted) return; [523,659,784,1046].forEach(function(f,i){ tone(f,i*0.14,0.22,0.14,"triangle"); }); }

  // ---- Gravemaskin SVG ----
  function excavator(size, live) {
    var beacon = live ? ' style="animation:blink 1s ease-in-out infinite"' : "";
    return '<svg width="'+size+'" height="'+(size*0.84)+'" viewBox="0 0 144 120" aria-hidden="true">'
      + '<rect x="8" y="84" width="112" height="28" rx="14" fill="#2B2622"/>'
      + '<rect x="8" y="84" width="112" height="28" rx="14" fill="none" stroke="#1B1713" stroke-width="2"/>'
      + [28,44,60,76,92].map(function(x){return '<rect x="'+x+'" y="86" width="3" height="24" rx="1.5" fill="#3C352F"/>';}).join("")
      + '<circle cx="26" cy="98" r="11" fill="#4A433C" stroke="#15110D" stroke-width="3"/>'
      + '<circle cx="102" cy="98" r="11" fill="#4A433C" stroke="#15110D" stroke-width="3"/>'
      + '<circle cx="26" cy="98" r="3.5" fill="#8C8278"/><circle cx="102" cy="98" r="3.5" fill="#8C8278"/>'
      + [46,64,82].map(function(x){return '<circle cx="'+x+'" cy="104" r="5" fill="#5A524B" stroke="#15110D" stroke-width="1.5"/>';}).join("")
      + '<rect x="28" y="72" width="76" height="14" rx="6" fill="#D9760F" stroke="#B5610B" stroke-width="1.5"/>'
      + '<rect x="20" y="50" width="18" height="24" rx="5" fill="#E8841A" stroke="#B5610B" stroke-width="2"/>'
      + '<rect x="34" y="38" width="56" height="36" rx="10" fill="#F5B921" stroke="#C9871A" stroke-width="3"/>'
      + '<line x1="62" y1="40" x2="62" y2="72" stroke="#D9A028" stroke-width="1.5"/>'
      + '<path d="M40 44 h17 v20 h-22 z" fill="#BFE6F7" stroke="#8FB9D2" stroke-width="2" stroke-linejoin="round"/>'
      + '<path d="M40 44 l-5 20" stroke="#8FB9D2" stroke-width="1.2"/>'
      + '<circle cx="84" cy="56" r="4" fill="#FFF3C0" stroke="#C9871A" stroke-width="1.5"/>'
      + '<rect x="44" y="28" width="5" height="12" rx="2" fill="#5A524B"/><rect x="43" y="26" width="7" height="4" rx="2" fill="#3C352F"/>'
      + '<rect x="60" y="30" width="10" height="8" rx="2" fill="#6E655C"/>'
      + '<circle cx="65" cy="29" r="4.5" fill="#FF8A3D"'+beacon+'/>'
      + '<g class="arm">'
      + '<path d="M88 56 L116 28" stroke="#E8841A" stroke-width="9" stroke-linecap="round"/>'
      + '<path d="M88 56 L116 28" stroke="#FBC04A" stroke-width="2.5" stroke-linecap="round"/>'
      + '<path d="M84 62 L106 42" stroke="#9A9386" stroke-width="3.5" stroke-linecap="round"/>'
      + '<circle cx="116" cy="28" r="4.5" fill="#33291F"/>'
      + '<path d="M116 28 L126 54" stroke="#E8841A" stroke-width="8" stroke-linecap="round"/>'
      + '<path d="M114 30 L122 50" stroke="#9A9386" stroke-width="2.5" stroke-linecap="round"/>'
      + '<path d="M118 50 q-3 17 13 19 l9 -4 -3 -17 z" fill="#33291F" stroke="#1B1713" stroke-width="1.5"/>'
      + '<path d="M129 67 l2 6 4 -3 z M134 65 l2.5 5.5 3.5 -3.5 z M124 68 l1.5 5.5 3.5 -3 z" fill="#FFD23F"/>'
      + '</g></svg>';
  }

  var STAR = "M12 1.6l3.1 6.3 6.9 1-5 4.9 1.2 6.9L12 17.4 5.8 20.6 7 13.7 2 8.8l6.9-1z";
  function starSvg(filled, pop) {
    return '<svg class="star'+(pop?' pop':'')+'" width="44" height="44" viewBox="0 0 24 24" '
      + 'style="'+(filled?'filter:drop-shadow(0 3px 4px rgba(232,161,0,.45))':'')+'">'
      + '<path d="'+STAR+'" fill="'+(filled?'#FFD23F':'#F0E4CE')+'" stroke="'+(filled?'#E8A100':'#D8C7A6')+'" stroke-width="1.4" stroke-linejoin="round"/></svg>';
  }

  // ---- Faste elementer ----
  document.getElementById("headExc").innerHTML = excavator(52, false);
  document.getElementById("sceneExc").innerHTML = excavator(64, true);
  document.getElementById("overlayExc").innerHTML = excavator(120, true);
  document.getElementById("prizeBox").innerHTML = excavator(46, false);

  var els = {
    starGrid: document.getElementById("starGrid"),
    count: document.getElementById("count"),
    tower: document.getElementById("tower"),
    prizeBox: document.getElementById("prizeBox"),
    giveBtn: document.getElementById("giveBtn"),
    soundBtn: document.getElementById("soundBtn"),
    grownupBox: document.getElementById("grownupBox"),
    prizesWon: document.getElementById("prizesWon"),
    roundCount: document.getElementById("roundCount"),
    logList: document.getElementById("logList"),
    undoBtn: document.getElementById("undoBtn"),
    overlay: document.getElementById("overlay"),
    arm: function () { return document.querySelector("#sceneExc .arm"); }
  };

  var justEarned = -1;

  function paint() {
    // stjerner
    var sg = "";
    for (var i = 0; i < GOAL; i++) sg += starSvg(i < state.stars, i === justEarned);
    els.starGrid.innerHTML = sg;
    // teller
    els.count.textContent = state.stars === GOAL ? "Alle 10! 🎉" : state.stars + " av " + GOAL;
    // tårn
    var t = "";
    for (var c = 0; c < state.stars; c++) {
      var even = c % 2 === 0;
      var anim = (c === state.stars - 1) ? ' style="background-position:' + (even?'0 0':'11px 0') + ';animation:dropIn .4s ease both"'
                                         : ' style="background-position:' + (even?'0 0':'11px 0') + '"';
      t += '<div class="course"' + anim + '>'
         + (c === 0 ? '<div class="gate"></div>' : '')
         + (c === 3 || c === 6 ? '<div class="slit"></div>' : '')
         + '</div>';
    }
    if (state.stars > 0) {
      t += '<div class="cap"><div class="parapet"></div><div class="merlonRow">'
         + '<div class="merlon"></div><div class="merlon"></div><div class="merlon"></div><div class="merlon"></div><div class="merlon"></div>'
         + '</div></div>';
      t += '<div class="flag"><div class="flagPole"></div><div class="pennant"></div></div>';
    }
    els.tower.innerHTML = t;
    // premie
    els.prizeBox.className = "prizeBox" + (state.stars >= GOAL ? " won" : "");
    // knapp / lyd
    els.giveBtn.disabled = state.stars >= GOAL;
    els.soundBtn.textContent = state.muted ? "🔇" : "🔊";
    // voksen-panel
    els.prizesWon.textContent = state.prizesWon + " 🏰";
    els.roundCount.textContent = state.stars + " / " + GOAL;
    els.undoBtn.disabled = state.stars === 0;
    var ll = "";
    for (var k = 0; k < state.log.length; k++) {
      var dd = new Date(state.log[k]).toLocaleDateString("nb-NO", { weekday: "short", day: "numeric", month: "short" });
      ll += '<span class="logItem">⭐ ' + dd + '</span>';
    }
    els.logList.innerHTML = ll;
  }

  function confetti() {
    var emoji = ["⭐", "🚜", "🏰", "✨"];
    for (var i = 0; i < 28; i++) {
      var s = document.createElement("span");
      s.className = "confetti";
      s.textContent = emoji[i % 4];
      s.style.left = (Math.random() * 100) + "%";
      s.style.animationDelay = (Math.random() * 0.8) + "s";
      s.style.animationDuration = (1.6 + Math.random() * 1.4) + "s";
      els.overlay.appendChild(s);
      (function (node) { setTimeout(function () { if (node.parentNode) node.parentNode.removeChild(node); }, 3500); })(s);
    }
  }

  function showOverlay() { els.overlay.classList.add("show"); confetti(); }

  function give() {
    if (state.stars >= GOAL) return;
    state.stars++;
    state.log.push(new Date().toISOString());
    justEarned = state.stars - 1;
    save();
    paint();
    var arm = els.arm();
    if (arm) { arm.classList.add("dig"); setTimeout(function () { arm.classList.remove("dig"); }, 450); }
    if (state.stars >= GOAL) { winSound(); setTimeout(showOverlay, 650); }
    else { starSound(); }
  }

  els.giveBtn.addEventListener("click", give);
  els.soundBtn.addEventListener("click", function () { state.muted = !state.muted; save(); paint(); });
  els.undoBtn.addEventListener("click", function () {
    if (state.stars <= 0) return;
    state.stars--; state.log.pop(); justEarned = -1; save(); paint();
  });
  document.getElementById("resetBtn").addEventListener("click", function () {
    state.stars = 0; state.log = []; justEarned = -1; save(); paint();
    els.overlay.classList.remove("show");
  });
  document.getElementById("newRoundBtn").addEventListener("click", function () {
    state.prizesWon++; state.stars = 0; state.log = []; justEarned = -1; save(); paint();
    els.overlay.classList.remove("show");
  });
  document.getElementById("grownupToggle").addEventListener("click", function () {
    var open = els.grownupBox.style.display !== "none";
    els.grownupBox.style.display = open ? "none" : "block";
    this.textContent = open ? "For mamma og pappa ▼" : "Skjul ▲";
  });

  paint();
  if (state.stars >= GOAL) els.overlay.classList.add("show");
})();
</script>
</body>
</html>
